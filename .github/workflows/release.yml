name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "release-assets/**"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build release package
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Copy packaged zip into repository asset folder
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item -LiteralPath artifacts/release/OpenAudio-win-x64.zip -Destination release-assets/OpenAudio-win-x64.zip -Force

      - name: Commit packaged zip to main
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-assets/OpenAudio-win-x64.zip
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update packaged OpenAudio build"
            git push
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAudio-win-x64
          path: artifacts/release/OpenAudio-win-x64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/OpenAudio-win-x64.zip
          generate_release_notes: true

